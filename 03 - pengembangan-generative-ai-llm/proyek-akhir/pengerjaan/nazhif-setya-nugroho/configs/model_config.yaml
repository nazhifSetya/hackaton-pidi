# PGABL - SLM base model + LoRA + QLoRA configuration
# Load: yaml.safe_load(open("configs/model_config.yaml"))

# ==================== Base model ====================
base_model_id: unsloth/Llama-3.2-3B-Instruct
max_seq_length: 2048
load_in_4bit: true

# ==================== QLoRA 4-bit double quantization ====================
# Rubric WAJIB double quantization
quantization:
  bnb_4bit_compute_dtype: bfloat16   # T4 tidak native bf16 - akan auto fallback ke fp16 saat training
  bnb_4bit_quant_type: nf4            # Normal Float 4-bit (paper QLoRA)
  bnb_4bit_use_double_quant: true     # WAJIB per rubric

# ==================== LoRA adapter ====================
# Rubric Skilled: minimal di MHA + FFN (7 target modules)
lora:
  r: 16                               # rank - Skilled variation bisa naikkan ke 32
  alpha: 32                           # umumnya 2x rank
  dropout: 0.05
  bias: none
  target_modules:
    # Multi-Head Attention (MHA)
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    # Feed Forward Network (FFN) - WAJIB Skilled
    - gate_proj
    - up_proj
    - down_proj
  use_gradient_checkpointing: unsloth  # WAJIB untuk fit di T4 16GB

# ==================== Push to HuggingFace Hub ====================
# Rubric: merged_16bit + Public
push_to_hub:
  save_method: merged_16bit           # WAJIB per rubric
  private: false                      # WAJIB Public
  # Repo naming (isi di paths.yaml → hf_repos)

# ==================== Chat template ====================
# Llama-3 chat template - apply via datasets.map()
chat_template:
  name: llama-3
  system_prompt: "Anda adalah asisten AI yang membantu."
  # Special tokens yang HARUS muncul di output ter-format:
  #   <|begin_of_text|>
  #   <|start_header_id|>{role}<|end_header_id|>
  #   <|eot_id|>

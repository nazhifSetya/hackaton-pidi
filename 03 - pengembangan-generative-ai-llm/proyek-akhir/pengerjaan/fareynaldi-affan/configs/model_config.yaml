# PGABL (Fareynaldi, BASIC) - konfigurasi SLM + LoRA
# Load: yaml.safe_load(open("configs/model_config.yaml"))

base_model_id: unsloth/Llama-3.2-3B-Instruct
max_seq_length: 2048
dtype: null                 # auto (bfloat16 di T4)
load_in_4bit: true          # QLoRA

# QLoRA (double quantization) - HARD RULE
quant:
  bnb_4bit_quant_type: nf4
  bnb_4bit_use_double_quant: true
  bnb_4bit_compute_dtype: bfloat16

# LoRA - target MHA + FFN
lora:
  r: 16
  alpha: 16
  dropout: 0.0
  bias: none
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj
  use_gradient_checkpointing: unsloth

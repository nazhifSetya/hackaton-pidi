# Konfigurasi Prometheus untuk memantau layanan model kultivar anggur.
# Prometheus melakukan scrape endpoint /metrics milik eksporter Flask tiap 5 detik.
global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  - job_name: "anggur_model_service"
    metrics_path: /metrics
    static_configs:
      - targets: ["host.docker.internal:8010"]
        labels:
          service: "kultivar-anggur-api"

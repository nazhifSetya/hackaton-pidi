name: santap_lens
description: "SantapLens — aplikasi pengenal makanan dari foto memakai model AIY Food V1 (Google) di atas LiteRT. Proyek akhir kelas Belajar Penerapan Machine Learning untuk Flutter (Dicoding) oleh Dafina."

publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Pengambilan gambar dari kamera / galeri (Kriteria 1).
  image_picker: ^1.1.2

  # Runtime LiteRT untuk menjalankan model .tflite di perangkat (Kriteria 2).
  flutter_litert: ^3.5.1

  # Decoding & resize gambar sebelum inferensi.
  image: ^4.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/models/aiy_food_v1.tflite
    - assets/models/labels.txt

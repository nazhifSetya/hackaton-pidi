name: CI - Retrain Model

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  train:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mlflow==2.19.0 scikit-learn==1.7.2 pandas==2.3.3 numpy

      - name: Run MLflow Project (re-train model)
        working-directory: MLProject
        run: |
          mlflow run . --env-manager=local --experiment-name "Diabetes_Classification_CI"

      - name: Show MLflow runs directory
        working-directory: MLProject
        run: |
          echo "Isi direktori mlruns hasil training:"
          ls -R mlruns | head -50
